name: ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || {
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' and commit the result.";
            exit 1;
          }

      - name: Check formatting (excludes generated client)
        run: |
          # internal/client is OpenAPI-generated and is not gofmt-clean by design.
          files="$(git ls-files '*.go' | grep -v '^internal/client/')"
          unformatted="$(gofmt -l $files)"
          if [[ -n "$unformatted" ]]; then
            echo "::error::The following files need 'gofmt -w':";
            echo "$unformatted";
            exit 1;
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -cover ./...

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate docs
        run: go generate ./...

      - name: Check docs are up to date
        run: |
          git diff --exit-code -- docs/ || {
            echo "::error::Generated docs are out of date. Run 'make docs' (or 'go generate ./...') and commit the result.";
            exit 1;
          }
